name: Daily EONR Scraper Pipeline

on:
  schedule:
    - cron: '0 8 * * *' # Run at 8:00 AM UTC everyday
  workflow_dispatch:
    inputs:
      full_scrape:
        description: 'Run deep historical scrape (1998-2026)?'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Execute Scraper
        run: |
          if [ "${{ github.event.inputs.full_scrape }}" = "true" ]; then
            npm run scrape:full
          else
            npm run scrape:daily
          fi

      - name: Commit and Push Updates
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "data: auto-update daily EONR JSON records" || echo "No new records to commit."
          git push
