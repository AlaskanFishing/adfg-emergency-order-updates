name: "ADFG EONR Delta Pipeline (Playwright GPU)"

on:
  schedule:
    - cron: '0 16 * * *' # Midnight UTC
  workflow_dispatch:
    inputs:
      full_scrape:
        description: 'Run Full Archive (1998-Current) vs Delta Mode'
        type: boolean
        default: false

jobs:
  scrape-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Execute Playwright Scraper
        run: |
          if [ "${{ github.event.inputs.full_scrape }}" = "true" ]; then
             python scripts/playwright_scraper.py
          else
             python scripts/playwright_scraper.py --delta
          fi

      - name: Commit Sharded JSON Database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add data/
          git diff --staged --quiet || git commit -m "data(bot): auto-sharded EONR scrape & deep PDF extraction"
          git push
